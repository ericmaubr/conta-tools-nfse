<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContaTools — NFS-e</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: #f0f2f5;
      color: #222;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      background: #1a3c5e;
      color: #fff;
      padding: 11px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
    header .version { font-size: 11px; color: rgba(255,255,255,.35); margin-left: auto; }
    nav { display: flex; gap: 4px; }
    nav a {
      color: rgba(255,255,255,.65);
      text-decoration: none;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
      transition: background .15s, color .15s;
    }
    nav a:hover { background: rgba(255,255,255,.1); color: #fff; }
    nav a.active { background: rgba(255,255,255,.18); color: #fff; font-weight: 600; }

    /* ── Layout: sidebar + main ── */
    .layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 272px;
      flex-shrink: 0;
      background: #fff;
      border-right: 1px solid #dde3ea;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sb-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: #888;
      margin-bottom: 8px;
    }
    .sb-section { margin-bottom: 14px; }
    .sb-divider {
      border: none;
      border-top: 1px solid #eaecf0;
      margin: 12px 0;
    }
    .sb-status { font-size: 11px; margin-top: 5px; color: #888; line-height: 1.4; }
    .sb-meta   { font-size: 11px; color: #999; margin-top: 4px; }

    .sb-btn-row { display: flex; gap: 6px; margin-top: 7px; }
    .sb-btn {
      flex: 1; padding: 6px 0;
      border-radius: 5px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .sb-btn.primary { background: #1a3c5e; color: #fff; }
    .sb-btn.primary:hover { background: #245082; }
    .sb-btn.secondary { background: #f0f2f5; color: #444; border: 1px solid #d0d5dd; }
    .sb-btn.secondary:hover { background: #e4e8ef; }

    /* RPS field in sidebar */
    .rps-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .rps-row label { font-size: 11px; color: #888; white-space: nowrap; }
    .rps-row input[type=number] {
      width: 72px; padding: 5px 7px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 13px; color: #222;
    }
    .rps-row input[type=number]:focus {
      outline: none; border-color: #1a3c5e;
      box-shadow: 0 0 0 2px rgba(26,60,94,.12);
    }
    .rps-loading { font-size: 11px; color: #aaa; }

    /* ── Main content ── */
    .main-area {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
    }

    /* Result banner */
    #resultado {
      flex-shrink: 0;
      border-radius: 7px;
      padding: 10px 14px;
      margin-bottom: 10px;
      font-size: 12px;
      line-height: 1.5;
    }
    #resultado.ok   { background: #e8f5e9; border-left: 4px solid #2e7d32; }
    #resultado.erro { background: #fdecea; border-left: 4px solid #c62828; }
    #resultado h3   { font-size: 13px; margin-bottom: 4px; }
    #resultado .detail { font-family: monospace; word-break: break-all; }
    #resultado .aviso {
      margin-top: 6px; padding: 5px 8px;
      background: #fff8e1; border-radius: 4px;
      font-size: 11px; color: #6b4c00;
    }

    /* Form sections */
    .section {
      background: #fff;
      border-radius: 7px;
      box-shadow: 0 1px 3px rgba(0,0,0,.07);
      padding: 9px 12px;
      margin-bottom: 8px;
    }
    .section h2 {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #888;
      margin-bottom: 7px;
      padding-bottom: 5px;
      border-bottom: 1px solid #f0f2f5;
    }

    /* Grid */
    .grid   { display: grid; gap: 6px 10px; }
    .g2     { grid-template-columns: 1fr 1fr; }
    .g3     { grid-template-columns: 1fr 1fr 1fr; }
    .g4     { grid-template-columns: 1fr 1fr 1fr 1fr; }
    .g32    { grid-template-columns: 3fr 1fr; }

    label { display: block; }
    label span { display: block; font-size: 11px; color: #666; margin-bottom: 3px; }
    label span.req::after { content: " *"; color: #d00; }

    input[type=text], input[type=email], input[type=number], input[type=month],
    select, textarea {
      width: 100%; padding: 6px 8px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 13px; color: #222;
      background: #fff;
      transition: border-color .15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: #1a3c5e;
      box-shadow: 0 0 0 2px rgba(26,60,94,.12);
    }
    textarea { resize: vertical; min-height: 44px; font-family: inherit; }
    select   { cursor: pointer; }

    /* Sidebar select */
    .sidebar select {
      width: 100%; padding: 6px 8px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 13px; color: #222; background: #fff; cursor: pointer;
    }
    .sidebar select:focus {
      outline: none; border-color: #1a3c5e;
      box-shadow: 0 0 0 2px rgba(26,60,94,.12);
    }
    .sidebar input[type=password] {
      width: 100%; padding: 6px 8px;
      border: 1px solid #ccc; border-radius: 5px;
      font-size: 13px; font-family: monospace;
      background: #fff;
    }
    .sidebar input[type=password]:focus {
      outline: none; border-color: #1a3c5e;
      box-shadow: 0 0 0 2px rgba(26,60,94,.12);
    }

    /* Checkbox */
    .check-row { display: flex; align-items: center; gap: 7px; padding-top: 10px; }
    .check-row input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
    .check-row label { cursor: pointer; font-size: 12px; color: #444; }

    /* Emitir */
    #btn-emitir {
      display: block; width: 100%;
      background: #1a3c5e; color: #fff;
      border: none; border-radius: 6px;
      padding: 10px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
      margin-top: 2px;
      flex-shrink: 0;
    }
    #btn-emitir:hover { background: #245082; }
    #btn-emitir:disabled { background: #999; cursor: not-allowed; }

    /* CNPJ search button */
    .cnpj-btn {
      padding: 0 9px;
      border: 1px solid #ccc; border-radius: 5px;
      background: #f5f5f5; cursor: pointer; font-size: 14px;
      transition: background .15s; flex-shrink: 0;
    }
    .cnpj-btn:hover { background: #e8e8e8; }
    .cnpj-status { font-size: 10px; margin-top: 2px; min-height: 13px; color: #888; }

    /* Spinner */
    .spin {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    /* Retenções federais */
    .ret-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 5px 10px;
    }
    .ret-cell { display: flex; flex-direction: column; gap: 2px; }
    .ret-nome { font-size: 10px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: .3px; }
    .ret-aliq-row { display: flex; align-items: center; gap: 3px; }
    .ret-aliq-row > span { font-size: 11px; color: #888; }
    input.ret-aliq-inp { width: 50px; padding: 3px 5px; font-size: 11px; color: #666; }
    input.ret-val-inp  { padding: 5px 7px; font-size: 12px; }
  </style>
</head>
<body>

<header>
  <h1>ContaTools</h1>
  <nav>
    <a href="/" class="active">NFS-e</a>
    <a href="/pessoas-fisicas-ui">Pessoas Físicas</a>
  </nav>
  <span class="version" id="app-version"></span>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <!-- Autenticação -->
    <div class="sb-section">
      <div class="sb-title">Autenticação</div>
      <input id="token-input" type="password" placeholder="Bearer token"
             autocomplete="off" onkeydown="if(event.key==='Enter') salvarToken()">
      <div class="sb-btn-row">
        <button class="sb-btn primary" onclick="salvarToken()">Conectar</button>
        <button class="sb-btn secondary" onclick="limparToken()">Sair</button>
      </div>
      <div class="sb-status" id="token-status"></div>
    </div>

    <hr class="sb-divider hidden" id="sb-divider">

    <!-- Prestador (oculto até conectar) -->
    <div class="sb-section hidden" id="sec-prestador-sb">
      <div class="sb-title">Empresa emissora</div>
      <select id="sel-prestador" onchange="onPrestadorChange()">
        <option value="">Selecione...</option>
      </select>

      <div class="rps-row">
        <label>Próx. RPS</label>
        <input type="number" id="numero_rps" min="1" placeholder="—">
        <span class="rps-loading hidden" id="rps-loading">buscando...</span>
      </div>
    </div>

  </aside>

  <!-- ── Painel principal ── -->
  <div class="main-area">

    <!-- Banner de resultado -->
    <div id="resultado" class="hidden"></div>

    <!-- Formulário (oculto até conectar) -->
    <form id="form" class="hidden" onsubmit="submitForm(event)">

      <!-- TOMADOR -->
      <div class="section">
        <h2 style="display:flex;align-items:center;justify-content:space-between;">
          Tomador
          <button type="button" onclick="limparTomador()"
                  style="font-size:10px;font-weight:500;color:#888;background:none;border:none;
                         cursor:pointer;padding:0;letter-spacing:.3px;text-transform:none;"
                  title="Limpar dados do tomador">Limpar</button>
        </h2>

        <!-- Linha 1: CNPJ | CPF | Razão social | E-mail -->
        <div class="grid" style="grid-template-columns:1.7fr 1.5fr 3fr 1.8fr;margin-bottom:6px;">
          <label>
            <span>CNPJ</span>
            <div style="display:flex;gap:5px;">
              <input type="text" id="tomador_cnpj" name="tomador_cnpj"
                     placeholder="00.000.000/0000-00" maxlength="18" style="flex:1;">
              <button type="button" id="btn-buscar-cnpj" class="cnpj-btn"
                      onclick="buscarCnpj()" title="Buscar pelo CNPJ">🔍</button>
            </div>
            <div class="cnpj-status" id="cnpj-status"></div>
          </label>
          <label>
            <span>CPF</span>
            <div style="display:flex;gap:5px;">
              <input type="text" id="tomador_cpf" name="tomador_cpf"
                     placeholder="000.000.000-00" maxlength="14" style="flex:1;"
                     oninput="onCpfInput()">
              <button type="button" id="btn-buscar-cpf" class="cnpj-btn"
                      onclick="buscarCpf()" title="Buscar pelo CPF">🔍</button>
            </div>
            <div class="cnpj-status" id="cpf-status"></div>
          </label>
          <label>
            <span class="req">Razão social / Nome</span>
            <input type="text" id="tomador_razao_social" name="tomador_razao_social" required>
          </label>
          <label>
            <span>E-mail</span>
            <input type="email" id="tomador_email" name="tomador_email">
          </label>
        </div>

        <!-- Linha 2: Logradouro | Número -->
        <div class="grid g3" style="margin-bottom:6px;">
          <label style="grid-column:span 2;">
            <span>Logradouro</span>
            <input type="text" id="tomador_logradouro" name="tomador_logradouro">
          </label>
          <label>
            <span>Número</span>
            <input type="text" id="tomador_numero" name="tomador_numero">
          </label>
        </div>

        <!-- Linha 3: Complemento | Bairro | CEP | UF -->
        <div class="grid g4">
          <label>
            <span>Complemento</span>
            <input type="text" id="tomador_complemento" name="tomador_complemento">
          </label>
          <label>
            <span>Bairro</span>
            <input type="text" id="tomador_bairro" name="tomador_bairro">
          </label>
          <label>
            <span>CEP</span>
            <input type="text" id="tomador_cep" name="tomador_cep" maxlength="9">
          </label>
          <label>
            <span>UF</span>
            <input type="text" id="tomador_uf" name="tomador_uf" maxlength="2"
                   style="text-transform:uppercase;">
          </label>
        </div>
        <input type="hidden" id="tomador_municipio_ibge" name="tomador_municipio_ibge">
      </div>

      <!-- DADOS DA NOTA -->
      <div class="section">
        <h2>Dados da Nota</h2>

        <div class="grid" style="grid-template-columns:1fr 1fr 1fr 1.8fr 1fr;margin-bottom:6px;">
          <label>
            <span class="req">Competência</span>
            <input type="month" id="competencia" name="competencia" required>
          </label>
          <label>
            <span class="req">Valor do serviço (R$)</span>
            <input type="number" id="valor_servico" name="valor_servico"
                   min="0.01" step="0.01" required>
          </label>
          <label>
            <span class="req">Código do serviço (LC 116)</span>
            <input type="text" id="codigo_servico" name="codigo_servico"
                   placeholder="ex: 1.07" required>
          </label>
          <label id="row-cnae" class="hidden">
            <span class="req">CNAE</span>
            <select id="cnae-select" onchange="onCnaeSelectChange()" style="display:none;"></select>
            <input type="text" id="codigo_cnae" name="codigo_cnae"
                   placeholder="ex: 692060100" maxlength="9">
            <input type="text" id="cnae-manual" placeholder="Digite o CNAE (9 dígitos)"
                   maxlength="9" class="hidden" style="margin-top:4px;"
                   oninput="document.getElementById('codigo_cnae').value=this.value">
          </label>
          <label id="row-cod-trib">
            <span>Código tributação municipal</span>
            <input type="text" id="codigo_tributacao_municipio"
                   name="codigo_tributacao_municipio">
          </label>
        </div>

        <label style="margin-bottom:6px;">
          <span class="req">Discriminação dos serviços</span>
          <textarea id="discriminacao" name="discriminacao" required></textarea>
        </label>

        <div class="grid g2">
          <div class="check-row">
            <input type="checkbox" id="iss_retido" name="iss_retido"
                   onchange="onIssRetidoChange()">
            <label for="iss_retido">ISS Retido pelo tomador</label>
          </div>
          <div id="row-valor-iss" class="hidden" style="display:flex;gap:8px;align-items:flex-end;">
            <label style="flex:1;">
              <span>Alíquota ISS (%)</span>
              <input type="number" id="aliq_iss" step="0.01" min="0" max="100"
                     oninput="calcIss()">
            </label>
            <label style="flex:2;">
              <span>Valor ISS retido (R$)</span>
              <input type="number" id="valor_iss" name="valor_iss" min="0" step="0.01">
            </label>
          </div>
        </div>
      </div>

      <!-- RETENÇÕES FEDERAIS -->
      <div class="section hidden" id="sec-retencoes">
        <h2>Retenções Federais</h2>
        <div class="ret-grid">
          <div class="ret-cell">
            <span class="ret-nome">PIS/PASEP</span>
            <div class="ret-aliq-row">
              <input type="number" class="ret-aliq-inp" id="aliq_pis" value="0.65" step="0.01" min="0" max="100"
                     oninput="calcRetencao('pis')">
              <span>%</span>
            </div>
            <input type="number" class="ret-val-inp" id="valor_pis" name="valor_pis" step="0.01" min="0" value="0">
          </div>
          <div class="ret-cell">
            <span class="ret-nome">COFINS</span>
            <div class="ret-aliq-row">
              <input type="number" class="ret-aliq-inp" id="aliq_cofins" value="3.00" step="0.01" min="0" max="100"
                     oninput="calcRetencao('cofins')">
              <span>%</span>
            </div>
            <input type="number" class="ret-val-inp" id="valor_cofins" name="valor_cofins" step="0.01" min="0" value="0">
          </div>
          <div class="ret-cell">
            <span class="ret-nome">INSS</span>
            <div class="ret-aliq-row">
              <input type="number" class="ret-aliq-inp" id="aliq_inss" value="0.00" step="0.01" min="0" max="100"
                     oninput="calcRetencao('inss')">
              <span>%</span>
            </div>
            <input type="number" class="ret-val-inp" id="valor_inss" name="valor_inss" step="0.01" min="0" value="0">
          </div>
          <div class="ret-cell">
            <span class="ret-nome">IRRF</span>
            <div class="ret-aliq-row">
              <input type="number" class="ret-aliq-inp" id="aliq_ir" value="1.50" step="0.01" min="0" max="100"
                     oninput="calcRetencao('ir')">
              <span>%</span>
            </div>
            <input type="number" class="ret-val-inp" id="valor_ir" name="valor_ir" step="0.01" min="0" value="0">
          </div>
          <div class="ret-cell">
            <span class="ret-nome">CSLL</span>
            <div class="ret-aliq-row">
              <input type="number" class="ret-aliq-inp" id="aliq_csll" value="1.00" step="0.01" min="0" max="100"
                     oninput="calcRetencao('csll')">
              <span>%</span>
            </div>
            <input type="number" class="ret-val-inp" id="valor_csll" name="valor_csll" step="0.01" min="0" value="0">
          </div>
          <div class="ret-cell">
            <span class="ret-nome">Outras</span>
            <div class="ret-aliq-row" style="visibility:hidden;">
              <input type="number" class="ret-aliq-inp" tabindex="-1" value="0">
              <span>%</span>
            </div>
            <input type="number" class="ret-val-inp" id="valor_outras_retencoes" name="valor_outras_retencoes" step="0.01" min="0" value="0">
          </div>
        </div>
      </div>

      <button type="submit" id="btn-emitir">Emitir NFS-e</button>

    </form>
  </div><!-- /main-area -->

</div><!-- /layout -->

<script>
  fetch('/version').then(r => r.json()).then(d => {
    document.getElementById('app-version').textContent = 'v' + d.version;
  }).catch(() => {});

  // ── Estado ──────────────────────────────────────────────────────
  let TOKEN = localStorage.getItem('nfse_token') || '';
  let currentSchema = null;

  // Pré-preenche competência com mês atual
  (function () {
    const n = new Date();
    document.getElementById('competencia').value =
      n.getFullYear() + '-' + String(n.getMonth() + 1).padStart(2, '0');
  })();

  // ── Token ────────────────────────────────────────────────────────
  function salvarToken() {
    const v = document.getElementById('token-input').value.trim();
    if (!v) return;
    TOKEN = v;
    localStorage.setItem('nfse_token', v);
    inicializar();
  }

  function limparToken() {
    TOKEN = '';
    localStorage.removeItem('nfse_token');
    document.getElementById('form').classList.add('hidden');
    document.getElementById('sec-prestador-sb').classList.add('hidden');
    document.getElementById('sb-divider').classList.add('hidden');
    document.getElementById('token-status').textContent = '';
    document.getElementById('token-input').value = '';
    document.getElementById('resultado').classList.add('hidden');
  }

  // ── API helper ───────────────────────────────────────────────────
  async function api(method, path, body) {
    const r = await fetch(path, {
      method,
      headers: {
        'Authorization': 'Bearer ' + TOKEN,
        ...(body ? { 'Content-Type': 'application/json' } : {}),
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    const data = await r.json().catch(() => ({ detail: r.statusText }));
    if (!r.ok) throw new Error(data.detail || r.statusText);
    return data;
  }

  // ── Inicialização ────────────────────────────────────────────────
  async function inicializar() {
    const statusEl = document.getElementById('token-status');
    statusEl.style.color = '#888';
    statusEl.textContent = 'Conectando...';
    try {
      const lista = await api('GET', '/prestadores');
      const sel = document.getElementById('sel-prestador');
      sel.innerHTML = '<option value="">Selecione...</option>';
      lista.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.nome;
        sel.appendChild(opt);
      });

      document.getElementById('sb-divider').classList.remove('hidden');
      document.getElementById('sec-prestador-sb').classList.remove('hidden');
      document.getElementById('form').classList.remove('hidden');

      statusEl.textContent = '✓ ' + lista.length + ' prestador(es)';
      statusEl.style.color = '#2e7d32';

      if (lista.length === 1) {
        sel.value = lista[0].id;
        onPrestadorChange();
      }
    } catch (e) {
      statusEl.textContent = '✗ ' + e.message;
      statusEl.style.color = '#c62828';
    }
  }

  // ── Ao selecionar prestador ──────────────────────────────────────
  async function onPrestadorChange() {
    const id = document.getElementById('sel-prestador').value;
    if (!id) { currentSchema = null; return; }

    try {
      const schema = await api('GET', '/prestadores/' + id);
      currentSchema = schema;

      _popularCnae(schema);
      _popularAliquotas(schema);
      if (schema.codigo_servico)
        document.getElementById('codigo_servico').value = schema.codigo_servico;
      limparTomador();
      document.getElementById('resultado').classList.add('hidden');

      // Busca próximo RPS de forma assíncrona
      document.getElementById('numero_rps').value = '';
      document.getElementById('rps-loading').classList.remove('hidden');
      api('GET', '/prestadores/' + id + '/proximo-rps')
        .then(d => {
          document.getElementById('numero_rps').value = d.proximo_rps;
        })
        .catch(() => {})
        .finally(() => {
          document.getElementById('rps-loading').classList.add('hidden');
        });
    } catch (e) {
      alert('Erro ao carregar prestador: ' + e.message);
    }
  }

  // ── CNAE ─────────────────────────────────────────────────────────
  function _popularCnae(schema) {
    const mostrar = schema.campos_extras.includes('codigo_cnae');
    document.getElementById('row-cnae').classList.toggle('hidden', !mostrar);
    if (!mostrar) return;

    const sel    = document.getElementById('cnae-select');
    const inp    = document.getElementById('codigo_cnae');
    const manual = document.getElementById('cnae-manual');
    const cnaes  = schema.cnaes || [];

    manual.classList.add('hidden');
    manual.value = '';

    if (cnaes.length === 0) {
      sel.style.display = 'none';
      inp.style.display = '';
      inp.value = '';
      inp.required = true;
      return;
    }

    sel.innerHTML = '';
    cnaes.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.codigo;
      opt.textContent = c.codigo + ' — ' + c.descricao;
      sel.appendChild(opt);
    });
    sel.appendChild(Object.assign(document.createElement('option'),
      { value: '_manual', textContent: 'Inserir manualmente...' }));

    sel.style.display = '';
    inp.style.display = 'none';
    inp.required = true;

    sel.value = cnaes[0].codigo;
    inp.value = cnaes[0].codigo;
  }

  function onCnaeSelectChange() {
    const sel    = document.getElementById('cnae-select');
    const inp    = document.getElementById('codigo_cnae');
    const manual = document.getElementById('cnae-manual');

    if (sel.value === '_manual') {
      manual.classList.remove('hidden');
      inp.value = '';
      manual.value = '';
      manual.focus();
    } else {
      manual.classList.add('hidden');
      inp.value = sel.value;
    }
  }

  // ── Alíquotas por prestador ──────────────────────────────────────
  function _popularAliquotas(schema) {
    const a = schema.aliq_retencoes || {};
    [['iss','aliq_iss'],['pis','aliq_pis'],['cofins','aliq_cofins'],
     ['inss','aliq_inss'],['ir','aliq_ir'],['csll','aliq_csll']].forEach(([n, key]) => {
      const el = document.getElementById('aliq_' + n);
      if (el && a[key] !== undefined) el.value = a[key];
    });
  }

  // ── ISS Retido ───────────────────────────────────────────────────
  function onIssRetidoChange() {
    const checked = document.getElementById('iss_retido').checked;
    document.getElementById('row-valor-iss').classList.toggle('hidden', !checked);
    if (checked) {
      calcIss();
    } else {
      document.getElementById('valor_iss').value = '';
    }
  }

  function calcIss() {
    const vs   = parseFloat(document.getElementById('valor_servico').value) || 0;
    const aliq = parseFloat(document.getElementById('aliq_iss').value) || 0;
    document.getElementById('valor_iss').value = (aliq / 100 * vs).toFixed(2);
  }

  // ── Submit ───────────────────────────────────────────────────────
  async function submitForm(e) {
    e.preventDefault();

    const prestador_id = document.getElementById('sel-prestador').value;
    if (!prestador_id) { alert('Selecione o prestador.'); return; }

    const numero_rps = document.getElementById('numero_rps').value;
    if (!numero_rps) { alert('Número do RPS não carregado ainda.'); return; }

    const _cnpjT = document.getElementById('tomador_cnpj').value.replace(/\D/g, '');
    const _cpfT  = document.getElementById('tomador_cpf').value.replace(/\D/g, '');
    if (_cnpjT && !validarCnpj(_cnpjT)) { alert('CNPJ do tomador inválido.'); return; }
    if (_cpfT  && !validarCpf(_cpfT))   { alert('CPF do tomador inválido.');  return; }

    const btn = document.getElementById('btn-emitir');
    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Emitindo...';
    document.getElementById('resultado').classList.add('hidden');

    const iss_retido = document.getElementById('iss_retido').checked;

    const body = {
      prestador_id,
      numero_rps,
      competencia:                 document.getElementById('competencia').value,
      discriminacao:               document.getElementById('discriminacao').value,
      codigo_servico:              document.getElementById('codigo_servico').value,
      codigo_cnae:                 document.getElementById('codigo_cnae').value || '',
      codigo_tributacao_municipio: document.getElementById('codigo_tributacao_municipio').value || '',
      valor_servico:               document.getElementById('valor_servico').value,
      iss_retido,
      valor_iss: iss_retido ? (document.getElementById('valor_iss').value || null) : null,
      tomador_razao_social:   document.getElementById('tomador_razao_social').value,
      tomador_cnpj:           document.getElementById('tomador_cnpj').value,
      tomador_cpf:            document.getElementById('tomador_cpf').value,
      tomador_email:          document.getElementById('tomador_email').value,
      tomador_logradouro:     document.getElementById('tomador_logradouro').value,
      tomador_numero:         document.getElementById('tomador_numero').value,
      tomador_complemento:    document.getElementById('tomador_complemento').value,
      tomador_bairro:         document.getElementById('tomador_bairro').value,
      tomador_cep:            document.getElementById('tomador_cep').value,
      tomador_municipio_ibge: document.getElementById('tomador_municipio_ibge').value,
      tomador_uf:             document.getElementById('tomador_uf').value,
      valor_pis:              document.getElementById('valor_pis').value || '0',
      valor_cofins:           document.getElementById('valor_cofins').value || '0',
      valor_inss:             document.getElementById('valor_inss').value || '0',
      valor_ir:               document.getElementById('valor_ir').value || '0',
      valor_csll:             document.getElementById('valor_csll').value || '0',
      valor_outras_retencoes: document.getElementById('valor_outras_retencoes').value || '0',
    };

    try {
      const r = await api('POST', '/nfse', body);

      const rpsUsado   = parseInt(numero_rps, 10);
      const rpsProximo = (r.rps_ajustado ? parseInt(r.rps_ajustado.para, 10) : rpsUsado) + 1;
      document.getElementById('numero_rps').value = rpsProximo;

      limparTomador();
      document.getElementById('valor_servico').value = '';
      document.getElementById('discriminacao').value = '';
      document.getElementById('iss_retido').checked = false;
      document.getElementById('valor_iss').value = '';
      document.getElementById('row-valor-iss').classList.add('hidden');

      mostrarSucesso(r);
    } catch (e) {
      mostrarErro(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Emitir NFS-e';
    }
  }

  // ── Resultado ────────────────────────────────────────────────────
  function mostrarSucesso(r) {
    const div = document.getElementById('resultado');
    div.className = 'ok';
    let h = '<h3>✓ NFS-e emitida</h3><div class="detail">Nº <strong>' + r.numero_nfse + '</strong>';
    if (r.codigo_verificacao) h += ' &nbsp;·&nbsp; Verif.: <strong>' + r.codigo_verificacao + '</strong>';
    h += '</div>';
    if (r.link_consulta) h += '<div style="margin-top:4px;"><a href="' + r.link_consulta + '" target="_blank" style="color:#1a5c2e;font-size:11px;">Ver na prefeitura ↗</a></div>';
    if (r.arquivo)       h += '<div style="margin-top:3px;font-size:11px;color:#555;">XML: ' + r.arquivo + '</div>';
    if (r.rps_ajustado)  h += '<div class="aviso">⚠ RPS ajustado de <strong>' + r.rps_ajustado.de + '</strong> → <strong>' + r.rps_ajustado.para + '</strong></div>';
    div.innerHTML = h;
    div.classList.remove('hidden');
  }

  function mostrarErro(msg) {
    const div = document.getElementById('resultado');
    div.className = 'erro';
    div.innerHTML = '<h3>✗ Erro na emissão</h3><div class="detail">' + esc(msg) + '</div>';
    div.classList.remove('hidden');
  }

  // ── Validação CPF / CNPJ ─────────────────────────────────────────
  function validarCpf(d) {
    d = d.replace(/\D/g, '');
    if (d.length !== 11 || /^(\d)\1{10}$/.test(d)) return false;
    let s = 0;
    for (let i = 0; i < 9; i++) s += +d[i] * (10 - i);
    let r = (s * 10) % 11; if (r >= 10) r = 0;
    if (r !== +d[9]) return false;
    s = 0;
    for (let i = 0; i < 10; i++) s += +d[i] * (11 - i);
    r = (s * 10) % 11; if (r >= 10) r = 0;
    return r === +d[10];
  }

  function validarCnpj(d) {
    d = d.replace(/\D/g, '');
    if (d.length !== 14 || /^(\d)\1{13}$/.test(d)) return false;
    const w = (ns, ws) => {
      const s = ns.reduce((a, n, i) => a + n * ws[i], 0) % 11;
      return s < 2 ? 0 : 11 - s;
    };
    const n = d.split('').map(Number);
    return w(n.slice(0,12),[5,4,3,2,9,8,7,6,5,4,3,2]) === n[12] &&
           w(n.slice(0,13),[6,5,4,3,2,9,8,7,6,5,4,3,2]) === n[13];
  }

  // ── Busca CNPJ ───────────────────────────────────────────────────
  async function buscarCnpj() {
    const cnpj   = document.getElementById('tomador_cnpj').value.replace(/\D/g, '');
    const status = document.getElementById('cnpj-status');
    const btn    = document.getElementById('btn-buscar-cnpj');

    if (cnpj.length !== 14) {
      status.style.color = '#c62828';
      status.textContent = 'CNPJ deve ter 14 dígitos.';
      return;
    }
    if (!validarCnpj(cnpj)) {
      status.style.color = '#c62828';
      status.textContent = 'CNPJ inválido.';
      return;
    }
    btn.disabled = true; btn.textContent = '⏳';
    status.style.color = '#888'; status.textContent = 'Consultando...';

    try {
      const d = await api('GET', '/cnpj/' + cnpj);
      document.getElementById('tomador_razao_social').value   = d.razao_social   || '';
      document.getElementById('tomador_email').value          = d.email          || '';
      document.getElementById('tomador_logradouro').value     = d.logradouro     || '';
      document.getElementById('tomador_numero').value         = d.numero         || '';
      document.getElementById('tomador_complemento').value    = d.complemento    || '';
      document.getElementById('tomador_bairro').value         = d.bairro         || '';
      document.getElementById('tomador_cep').value            = (d.cep || '').replace(/\D/g, '');
      document.getElementById('tomador_uf').value             = d.uf             || '';
      document.getElementById('tomador_municipio_ibge').value = d.municipio_ibge || '';
      status.style.color = '#2e7d32';
      status.textContent = '✓ Dados preenchidos';
      setTimeout(() => { status.textContent = ''; }, 4000);
      atualizarRetencoes(d.optante_simples === 'S' ? 'simples' : 'nao_simples');
    } catch (e) {
      status.style.color = '#c62828';
      status.textContent = '✗ ' + e.message;
    } finally {
      btn.disabled = false; btn.textContent = '🔍';
    }
  }

  // ── Busca CPF ─────────────────────────────────────────────────────
  function onCpfInput() {
    const cpf = document.getElementById('tomador_cpf').value.replace(/\D/g, '');
    document.getElementById('cpf-status').textContent = '';
    if (cpf.length === 11) buscarCpf();
  }

  async function buscarCpf() {
    const cpf    = document.getElementById('tomador_cpf').value.replace(/\D/g, '');
    const status = document.getElementById('cpf-status');
    const btn    = document.getElementById('btn-buscar-cpf');

    if (cpf.length !== 11) {
      status.style.color = '#c62828';
      status.textContent = 'CPF deve ter 11 dígitos.';
      return;
    }
    if (!validarCpf(cpf)) {
      status.style.color = '#c62828';
      status.textContent = 'CPF inválido.';
      return;
    }
    btn.disabled = true; btn.textContent = '⏳';
    status.style.color = '#888'; status.textContent = 'Consultando...';

    try {
      const d = await api('GET', '/pessoas-fisicas/' + cpf);
      document.getElementById('tomador_razao_social').value   = d.nome           || '';
      document.getElementById('tomador_email').value          = d.email          || '';
      document.getElementById('tomador_logradouro').value     = d.logradouro     || '';
      document.getElementById('tomador_numero').value         = d.numero         || '';
      document.getElementById('tomador_complemento').value    = d.complemento    || '';
      document.getElementById('tomador_bairro').value         = d.bairro         || '';
      document.getElementById('tomador_cep').value            = d.cep            || '';
      document.getElementById('tomador_uf').value             = d.uf             || '';
      document.getElementById('tomador_municipio_ibge').value = d.municipio_ibge || '';
      status.style.color = '#2e7d32';
      status.textContent = '✓ Dados preenchidos do cadastro';
      setTimeout(() => { status.textContent = ''; }, 4000);
    } catch (e) {
      if (e.message && e.message.includes('não encontrado')) {
        status.style.color = '#b45000';
        status.innerHTML = '⚠ CPF não cadastrado — <a href="/pessoas-fisicas-ui?cpf=' + cpf + '&modo=novo" target="_blank" style="color:#b45000;">Cadastrar</a>';
      } else {
        status.style.color = '#888';
        status.textContent = '';  // sem cadastro configurado — ignora silenciosamente
      }
    } finally {
      btn.disabled = false; btn.textContent = '🔍';
    }
  }

  // ── Helpers ──────────────────────────────────────────────────────
  function limparTomador() {
    ['tomador_cnpj','tomador_cpf','tomador_razao_social','tomador_email',
     'tomador_logradouro','tomador_numero','tomador_complemento',
     'tomador_bairro','tomador_cep','tomador_uf','tomador_municipio_ibge']
      .forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('cnpj-status').textContent = '';
    document.getElementById('cpf-status').textContent = '';
    atualizarRetencoes('reset');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Retenções federais ──────────────────────────────────────────
  function atualizarRetencoes(tipo) {
    const sec = document.getElementById('sec-retencoes');
    if (tipo === 'nao_simples') {
      sec.classList.remove('hidden');
      recalcularRetencoes();
    } else {
      sec.classList.add('hidden');
      zerarRetencoes();
    }
  }

  function zerarRetencoes() {
    ['pis','cofins','inss','ir','csll','outras_retencoes'].forEach(n => {
      const el = document.getElementById('valor_' + n);
      if (el) el.value = '0';
    });
  }

  function recalcularRetencoes() {
    const vs = parseFloat(document.getElementById('valor_servico').value) || 0;
    [['pis','aliq_pis'],['cofins','aliq_cofins'],['inss','aliq_inss'],
     ['ir','aliq_ir'],['csll','aliq_csll']].forEach(([n, aid]) => {
      const aliq = parseFloat(document.getElementById(aid).value) || 0;
      document.getElementById('valor_' + n).value = (aliq / 100 * vs).toFixed(2);
    });
  }

  function calcRetencao(nome) {
    const vs = parseFloat(document.getElementById('valor_servico').value) || 0;
    const aliq = parseFloat(document.getElementById('aliq_' + nome).value) || 0;
    document.getElementById('valor_' + nome).value = (aliq / 100 * vs).toFixed(2);
  }

  // Recalcula retenções quando valor do serviço muda
  document.getElementById('valor_servico').addEventListener('input', function () {
    if (!document.getElementById('sec-retencoes').classList.contains('hidden')) {
      recalcularRetencoes();
    }
    if (document.getElementById('iss_retido').checked) {
      calcIss();
    }
  });

  // CPF sem CNPJ → sem retenções federais
  document.getElementById('tomador_cpf').addEventListener('input', function () {
    const cpf  = this.value.replace(/\D/g, '');
    const cnpj = document.getElementById('tomador_cnpj').value.replace(/\D/g, '');
    if (cpf && !cnpj) atualizarRetencoes('cpf');
  });

  // ── Auto-login ───────────────────────────────────────────────────
  if (TOKEN) {
    document.getElementById('token-input').value = TOKEN;
    inicializar();
  }
</script>
