# example.conf — Configuração do prestador NFS-e
# Copie para cada empresa e preencha com os dados reais.
# ATENÇÃO: nunca versione arquivos .conf com senha real.

[prestador]
cert                = C:\certs\empresa.pfx
inscricao_municipal = 123456
optante_simples     = N          ; S = Simples Nacional, N = Não Optante
serie_rps           = 1          ; série do RPS (ex: 1, NFSE)
nome                = Empresa Exemplo Ltda  ; label na UI web (opcional)
municipio           = campinas   ; driver: campinas | sao_paulo (obrigatório para API)
output_dir          =            ; diretório para salvar XMLs emitidos via API (opcional)
; senha opcional: se omitido, usa a variável CONTA_TOOLS_CERT_PASSWORD
senha               =

[nfse]
; producao ou homologacao (default: producao)
ambiente = producao
