# example.conf - Configuracao do prestador NFS-e
# Copie para cada empresa e preencha com os dados reais.
# ATENCAO: nunca versione arquivos .conf com senha real.

[prestador]
cert                = C:\certs\empresa.pfx
inscricao_municipal = 123456
optante_simples     = N          ; S = Simples Nacional, N = Nao Optante
serie_rps           = 1          ; serie do RPS (ex: 1, NFSE)
nome                = Empresa Exemplo Ltda  ; label na UI web (opcional)
municipio           = campinas   ; driver: campinas | sao_paulo (obrigatorio para API)
output_dir          =            ; diretorio para salvar XMLs emitidos via API (opcional)
; senha opcional: se omitido, usa a variavel CONTA_TOOLS_CERT_PASSWORD
senha               =
; cnpj_prestador: preencha APENAS para procuracao eletronica.
; Quando definido, o CNPJ do XML sera este (empresa cliente),
; mas o certificado usado para assinar sera o do campo 'cert' acima (procuradora).
; A procuracao deve estar previamente registrada na prefeitura.
; Se omitido, o CNPJ e extraido automaticamente do certificado.
cnpj_prestador      =

[nfse]
; producao ou homologacao (default: producao)
ambiente = producao
