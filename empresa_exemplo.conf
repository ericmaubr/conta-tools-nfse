# Configuração do prestador para emissão de NFS-e
# Copie este arquivo e preencha com os dados reais de cada empresa.
# ATENÇÃO: não versione arquivos .conf com senha — adicione ao .gitignore

[prestador]
cert               = C:\certs\empresa_abc.pfx
inscricao_municipal = 123456
senha              = senha_do_certificado_aqui

[nfse]
# Ambiente do webservice: producao ou homologacao
# Sempre teste em homologacao antes de usar producao
ambiente = producao
